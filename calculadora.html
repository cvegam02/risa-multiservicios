<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora — RISA Multiservicios</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div style="display: flex; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(135deg, var(--navy-900) 0%, var(--navy-700) 100%); padding: 20px;">
    <div style="text-align: center; background: white; padding: 40px; border-radius: 16px; max-width: 500px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);">
      <h1 style="font-size: 32px; font-weight: 900; color: var(--navy-900); margin: 0 0 16px;">📍 Calculadora Movida</h1>
      <p style="font-size: 16px; color: var(--concrete-700); margin: 0 0 24px; line-height: 1.6;">
        La calculadora de materiales ahora está integrada en el panel de administración.
      </p>
      <p style="font-size: 14px; color: var(--concrete-700); margin: 0 0 32px;">
        Accede a <strong>Admin</strong> para generar presupuestos rápidamente.
      </p>
      <a href="admin.html" style="display: inline-block; padding: 14px 28px; background: var(--yellow-500); color: var(--ink); border: none; border-radius: 8px; font-weight: 800; text-decoration: none; cursor: pointer; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em;">
        Ir al Panel Admin →
      </a>
    </div>
  </div>
</body>
</html>
